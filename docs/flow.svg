<svg viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>claude-glm-2tier flow</title>
  <desc>Two Claude Code instances share one repo: Opus (Claude Max) plans and reviews; GLM-5.2 (Z.ai flat-fee) writes code. Review escalates: GLM self-verify, then Opus review, then optional Codex review.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="460" rx="18" fill="#0F172A"/>

  <!-- header -->
  <text x="40" y="50" font-size="26" font-weight="700" fill="#F1F5F9">claude-glm-2tier</text>
  <text x="40" y="74" font-size="13" fill="#94A3B8">Opus plans &amp; reviews · GLM writes the code · Codex = optional 3rd opinion</text>

  <!-- section 1 -->
  <text x="40" y="108" font-size="11" letter-spacing="2" fill="#64748B">① TWO INSTANCES, ONE REPO</text>
  <rect x="40" y="120" width="740" height="146" rx="14" fill="#131C31" stroke="#26324A"/>
  <text x="56" y="141" font-size="11" fill="#64748B">1 git repo · shared bus</text>

  <!-- Opus box -->
  <rect x="64" y="152" width="280" height="96" rx="12" fill="#E0794F14" stroke="#E0794F" stroke-width="1.5"/>
  <text x="84" y="184" font-size="15" font-weight="700" fill="#F1F5F9">Tab A · claude</text>
  <text x="84" y="206" font-size="12" fill="#94A3B8">Opus 4.8 — Claude Max</text>
  <text x="84" y="230" font-size="12" font-weight="700" fill="#E0794F">THE BRAIN · plan + review</text>

  <!-- GLM box -->
  <rect x="476" y="152" width="280" height="96" rx="12" fill="#38BDF814" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="496" y="184" font-size="15" font-weight="700" fill="#F1F5F9">Tab B · claude-glm</text>
  <text x="496" y="206" font-size="12" fill="#94A3B8">GLM-5.2 — Z.ai flat-fee</text>
  <text x="496" y="230" font-size="12" font-weight="700" fill="#38BDF8">THE HANDS · code + test</text>

  <!-- bus + arrows -->
  <line x1="344" y1="172" x2="470" y2="172" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="408" y="166" font-size="10" fill="#94A3B8" text-anchor="middle">plan</text>
  <rect x="352" y="187" width="116" height="26" rx="13" fill="#A78BFA1f" stroke="#A78BFA"/>
  <text x="410" y="204" font-size="10" fill="#C4B5FD" text-anchor="middle">activeContext.md</text>
  <line x1="476" y1="232" x2="350" y2="232" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="412" y="248" font-size="10" fill="#94A3B8" text-anchor="middle">review</text>

  <!-- section 2 -->
  <text x="40" y="300" font-size="11" letter-spacing="2" fill="#64748B">② REVIEW PIPELINE — independent, escalating</text>

  <!-- node 1: GLM self-verify -->
  <rect x="40" y="314" width="224" height="80" rx="12" fill="#38BDF814" stroke="#38BDF8" stroke-width="1.5"/>
  <text x="56" y="346" font-size="13" font-weight="700" fill="#F1F5F9">1 · GLM self-verify</text>
  <text x="56" y="367" font-size="11" fill="#94A3B8">tests &amp; lint green</text>
  <text x="56" y="387" font-size="11" font-weight="700" fill="#38BDF8">GLM pool</text>

  <line x1="264" y1="354" x2="298" y2="354" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- node 2: Opus review -->
  <rect x="298" y="314" width="224" height="80" rx="12" fill="#E0794F14" stroke="#E0794F" stroke-width="1.5"/>
  <text x="314" y="346" font-size="13" font-weight="700" fill="#F1F5F9">2 · Opus review</text>
  <text x="314" y="367" font-size="11" fill="#94A3B8">reads git diff only</text>
  <text x="314" y="387" font-size="11" font-weight="700" fill="#E0794F">Max pool</text>

  <line x1="522" y1="354" x2="556" y2="354" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- node 3: Codex review -->
  <rect x="556" y="314" width="224" height="80" rx="12" fill="#34D39914" stroke="#34D399" stroke-width="1.5"/>
  <text x="572" y="346" font-size="13" font-weight="700" fill="#F1F5F9">3 · Codex review</text>
  <text x="572" y="367" font-size="11" fill="#94A3B8">different vendor</text>
  <text x="572" y="387" font-size="11" font-weight="700" fill="#34D399">optional · risky 20%</text>

  <!-- footer -->
  <text x="410" y="434" font-size="12" fill="#CBD5E1" text-anchor="middle">Code runs on the cheap GLM pool — only review spends your Max weekly cap.</text>
</svg>
